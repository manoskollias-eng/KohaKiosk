<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Δανεισμός</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="screen">

    <h1>ΔΑΝΕΙΣΜΟΣ</h1>

    <form method="post" action="/checkout" class="form-box" id="checkoutForm">

        <label>Κάρτα Μέλους</label>

        <input
            type="text"
            name="patron_barcode"
            id="patron"
            required
            autofocus
            placeholder="Σκανάρετε κάρτα μέλους">

        <label>Barcode / RFID Βιβλίου</label>

        <input
            type="text"
            name="item_barcode"
            id="item"
            required
            placeholder="Σκανάρετε βιβλίο">

        <button
            type="submit"
            class="big-button">
            ΟΛΟΚΛΗΡΩΣΗ ΔΑΝΕΙΣΜΟΥ
        </button>

    </form>

    {% if result %}

        {% if result["success"] %}
            <div class="message success">
                {{ result["message"] }}
                <br>
                {{ result["title"] }}
            </div>
        {% else %}
            <div class="message error">
                {{ result["message"] }}
            </div>
        {% endif %}

    {% endif %}

    <a href="/" class="back-button">
        ΠΙΣΩ
    </a>

</div>

<script>

const patron = document.getElementById("patron");
const item = document.getElementById("item");
const form = document.getElementById("checkoutForm");

patron.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        e.preventDefault();

        item.focus();
    }

});

item.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        e.preventDefault();

        if(
            patron.value.trim() !== "" &&
            item.value.trim() !== ""
        ){
            form.submit();
        }

    }

});

</script>

</body>
</html>
